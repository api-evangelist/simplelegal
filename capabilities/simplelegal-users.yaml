naftiko: 1.0.0-alpha2
info:
  label: SimpleLegal API — Users
  description: 'SimpleLegal API — Users. 2 operations. Lead operation: List Users. Self-contained Naftiko capability covering
    one Simplelegal business surface.'
  tags:
  - Simplelegal
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SIMPLELEGAL_API_KEY: SIMPLELEGAL_API_KEY
capability:
  consumes:
  - type: http
    namespace: simplelegal-users
    baseUri: https://app.simplelegal.com/api/v1
    description: SimpleLegal API — Users business capability. Self-contained, no shared references.
    resources:
    - name: users
      path: /users
      operations:
      - name: listusers
        method: GET
        description: List Users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: page
          in: query
          type: integer
          description: Page number.
        - name: page_size
          in: query
          type: integer
          description: Results per page.
        - name: status
          in: query
          type: string
          description: Filter by user status.
      - name: createuser
        method: POST
        description: Create User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.SIMPLELEGAL_USER}}'
      password: '{{env.SIMPLELEGAL_PASS}}'
  exposes:
  - type: rest
    namespace: simplelegal-users-rest
    port: 8080
    description: REST adapter for SimpleLegal API — Users. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/users
      name: users
      description: REST surface for users.
      operations:
      - method: GET
        name: listusers
        description: List Users
        call: simplelegal-users.listusers
        with:
          page: rest.page
          page_size: rest.page_size
          status: rest.status
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createuser
        description: Create User
        call: simplelegal-users.createuser
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: simplelegal-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for SimpleLegal API — Users. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-users
      description: List Users
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: simplelegal-users.listusers
      with:
        page: tools.page
        page_size: tools.page_size
        status: tools.status
      outputParameters:
      - type: object
        mapping: $.
    - name: create-user
      description: Create User
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: simplelegal-users.createuser
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
