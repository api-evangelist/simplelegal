naftiko: 1.0.0-alpha2
info:
  label: SimpleLegal API — Invoices
  description: 'SimpleLegal API — Invoices. 4 operations. Lead operation: List Invoices. Self-contained Naftiko capability
    covering one Simplelegal business surface.'
  tags:
  - Simplelegal
  - Invoices
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SIMPLELEGAL_API_KEY: SIMPLELEGAL_API_KEY
capability:
  consumes:
  - type: http
    namespace: simplelegal-invoices
    baseUri: https://app.simplelegal.com/api/v1
    description: SimpleLegal API — Invoices business capability. Self-contained, no shared references.
    resources:
    - name: invoices
      path: /invoices
      operations:
      - name: listinvoices
        method: GET
        description: List Invoices
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: page
          in: query
          type: integer
          description: Page number.
        - name: page_size
          in: query
          type: integer
          description: Results per page.
        - name: status
          in: query
          type: string
          description: Filter by invoice status.
        - name: matter_id
          in: query
          type: string
          description: Filter invoices by matter ID.
        - name: vendor_id
          in: query
          type: string
          description: Filter invoices by vendor ID.
      - name: createinvoice
        method: POST
        description: Create Invoice
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: invoices-id
      path: /invoices/{id}
      operations:
      - name: getinvoice
        method: GET
        description: Get Invoice
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Invoice ID.
          required: true
      - name: updateinvoice
        method: PATCH
        description: Update Invoice
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Invoice ID.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.SIMPLELEGAL_USER}}'
      password: '{{env.SIMPLELEGAL_PASS}}'
  exposes:
  - type: rest
    namespace: simplelegal-invoices-rest
    port: 8080
    description: REST adapter for SimpleLegal API — Invoices. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/invoices
      name: invoices
      description: REST surface for invoices.
      operations:
      - method: GET
        name: listinvoices
        description: List Invoices
        call: simplelegal-invoices.listinvoices
        with:
          page: rest.page
          page_size: rest.page_size
          status: rest.status
          matter_id: rest.matter_id
          vendor_id: rest.vendor_id
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createinvoice
        description: Create Invoice
        call: simplelegal-invoices.createinvoice
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/invoices/{id}
      name: invoices-id
      description: REST surface for invoices-id.
      operations:
      - method: GET
        name: getinvoice
        description: Get Invoice
        call: simplelegal-invoices.getinvoice
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updateinvoice
        description: Update Invoice
        call: simplelegal-invoices.updateinvoice
        with:
          id: rest.id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: simplelegal-invoices-mcp
    port: 9090
    transport: http
    description: MCP adapter for SimpleLegal API — Invoices. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-invoices
      description: List Invoices
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: simplelegal-invoices.listinvoices
      with:
        page: tools.page
        page_size: tools.page_size
        status: tools.status
        matter_id: tools.matter_id
        vendor_id: tools.vendor_id
      outputParameters:
      - type: object
        mapping: $.
    - name: create-invoice
      description: Create Invoice
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: simplelegal-invoices.createinvoice
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-invoice
      description: Get Invoice
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: simplelegal-invoices.getinvoice
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: update-invoice
      description: Update Invoice
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: simplelegal-invoices.updateinvoice
      with:
        id: tools.id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
