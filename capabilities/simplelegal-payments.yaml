naftiko: 1.0.0-alpha2
info:
  label: SimpleLegal API — Payments
  description: 'SimpleLegal API — Payments. 2 operations. Lead operation: List Payments. Self-contained Naftiko capability
    covering one Simplelegal business surface.'
  tags:
  - Simplelegal
  - Payments
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SIMPLELEGAL_API_KEY: SIMPLELEGAL_API_KEY
capability:
  consumes:
  - type: http
    namespace: simplelegal-payments
    baseUri: https://app.simplelegal.com/api/v1
    description: SimpleLegal API — Payments business capability. Self-contained, no shared references.
    resources:
    - name: payments
      path: /payments
      operations:
      - name: listpayments
        method: GET
        description: List Payments
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: page
          in: query
          type: integer
          description: Page number.
        - name: page_size
          in: query
          type: integer
          description: Results per page.
        - name: invoice_id
          in: query
          type: string
          description: Filter payments by invoice ID.
      - name: createpayment
        method: POST
        description: Create Payment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.SIMPLELEGAL_USER}}'
      password: '{{env.SIMPLELEGAL_PASS}}'
  exposes:
  - type: rest
    namespace: simplelegal-payments-rest
    port: 8080
    description: REST adapter for SimpleLegal API — Payments. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/payments
      name: payments
      description: REST surface for payments.
      operations:
      - method: GET
        name: listpayments
        description: List Payments
        call: simplelegal-payments.listpayments
        with:
          page: rest.page
          page_size: rest.page_size
          invoice_id: rest.invoice_id
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createpayment
        description: Create Payment
        call: simplelegal-payments.createpayment
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: simplelegal-payments-mcp
    port: 9090
    transport: http
    description: MCP adapter for SimpleLegal API — Payments. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-payments
      description: List Payments
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: simplelegal-payments.listpayments
      with:
        page: tools.page
        page_size: tools.page_size
        invoice_id: tools.invoice_id
      outputParameters:
      - type: object
        mapping: $.
    - name: create-payment
      description: Create Payment
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: simplelegal-payments.createpayment
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
