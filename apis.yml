aid: simplelegal
name: SimpleLegal
description: >-
  SimpleLegal is Onit's mid-market enterprise legal management (ELM) platform trusted by 550+ corporate legal
  departments. It provides matter management, eBilling, spend management, vendor management, legal requests, and legal
  operations analytics for in-house legal teams. The SimpleLegal API is organized around REST with predictable,
  resource-oriented URLs, enabling integration with ERP and finance systems to eliminate duplicate data entry and
  automate legal operations workflows.
