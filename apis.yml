apis:
  - aid: simplelegal:simplelegal
    name: SimpleLegal API
    description: >-
      The SimpleLegal REST API enables programmatic access to legal matter management, invoice processing, vendor
      management, spend analytics, and legal operations data. The API uses HTTP authentication and supports PATCH and
      POST methods for updates. All responses return JSON. Pagination is supported with configurable page sizes. The API
      enables integration with AP/ERP systems to share data bidirectionally, eliminating manual data entry between legal
      and finance systems.
    humanURL: https://developer.simplelegal.com/
